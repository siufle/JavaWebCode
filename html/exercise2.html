<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>exercise2</title>
</head>
<body>
    <form action="" method="get">
        <div>
            <label>账&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;号</label>
            <input type="text" name="username">
        </div>
        <div>
            <label>密&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;码</label>
            <input type="password" name="password">
        </div>
        <div>
            <label>确认密码</label>
            <input type="password" name="conform">
        </div>
        <div>
            <label>联系电话</label>          <!--通过正则表达式指定输入格式-->
            <input type="text" name="phone" pattern="1[3-9][0-9]{9,9}">
        </div>
        <div>
            <label>性&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;别</label>
            <input type="radio" value="M" name="sex" checked>男
            <input type="radio" value="F" name="sex">女
            <input type="radio" value="O" name="sex">其他
        </div>
        <div>
            <label>国&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;籍</label>
            <select name="country">
                <option value="">请选择</option>
                <option value="CN">中国</option>
                <option value="JP">日本</option>
            </select>
        </div>
        <div>
            <input type="submit" value="登录">
        </div>
    </form>
</body>
</html>
