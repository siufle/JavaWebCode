<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <link rel="stylesheet" href="css/font.css" type="text/css">
    <style>
        .group{
            position: relative;
        }
        .group > i{
            position: absolute;
            left: 4px;
            top: 5px;
            color: #949090;
        }
        .group > input{
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="group">
        <i class="fa fa-user"></i>
        <input type="text">
    </div>
    <div class="group">
        <i class="fa fa-lock"></i>
        <input type="password">
    </div>
    <div>
        <input type="button" value="登录">
    </div>
</body>
</html>
