        header{
            height: 40px;
            background-color: black;
        }
        main{
            display: grid;
            grid-template-columns: 200px calc(100% - 200px);
            height: calc(100% - 40px);
        }
        aside{
            background-color: red;
        }
        section{
            display: grid;
            grid-template-rows: 40px calc(100% - 80px) 40px;
            height: 100%;
        }
        nav,footer{
            background-color: green;
            height: 40px;
        }
    </style>
</head>
